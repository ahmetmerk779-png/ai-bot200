<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Bot200 Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff6b6b;
        }

        .status-indicator.online {
            background: #51cf66;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ee5a52;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .stat:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #333;
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .inventory {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .inventory-item {
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .inventory-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .command-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .command-input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .tasks-list {
            list-style: none;
            margin-top: 15px;
        }

        .task-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #667eea;
        }

        .task-status {
            font-size: 12px;
            color: #666;
        }

        .logs {
            background: #1e1e1e;
            color: #0c0;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .log-line {
            padding: 2px 0;
            word-break: break-all;
        }

        .log-error {
            color: #ff6b6b;
        }

        .log-warning {
            color: #ffd93d;
        }

        .log-success {
            color: #51cf66;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .command-input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>🤖 AI-Bot200 Dashboard</h1>
                    <p style="color: #666; font-size: 14px;">Minecraft AI Bot Kontrol Paneli</p>
                </div>
                <div class="btn-group">
                    <button class="btn-primary" id="startBtn">▶ Bot Başlat</button>
                    <button class="btn-danger" id="stopBtn">⏹ Bot Durdur</button>
                </div>
            </div>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">Bot Çalışmıyor</span>
                </div>
                <div class="status-item">
                    <span>Sürüm: 1.0.0</span>
                </div>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h2>📊 Durum</h2>
                <div class="stat">
                    <span class="stat-label">Kullanıcı Adı:</span>
                    <span class="stat-value" id="username">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Konum:</span>
                    <span class="stat-value" id="position">-</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Boyut:</span>
                    <span class="stat-value" id="dimension">-</span>
                </div>
            </div>

            <div class="card">
                <h2>❤️ Sağlık</h2>
                <div class="stat">
                    <span class="stat-label">Can:</span>
                    <span class="stat-value" id="health">-</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="healthBar" style="width: 100%;"></div>
                </div>
                <div class="stat" style="margin-top: 10px;">
                    <span class="stat-label">Açlık:</span>
                    <span class="stat-value" id="hunger">-</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="hungerBar" style="width: 100%; background: #ff922b;"></div>
                </div>
            </div>

            <div class="card">
                <h2>⚙️ Ayarlar</h2>
                <label style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                    <input type="checkbox" id="autoMine" checked>
                    <span>Otomatik Madencilik</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                    <input type="checkbox" id="autoFarm" checked>
                    <span>Otomatik Farm</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                    <input type="checkbox" id="autoFish" checked>
                    <span>Otomatik Balıkçılık</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; margin: 10px 0;">
                    <input type="checkbox" id="autoFight" checked>
                    <span>Otomatik Savaş</span>
                </label>
            </div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <h2>🎒 Envanter</h2>
            <div class="inventory" id="inventory"></div>
        </div>

        <div class="command-section">
            <h2>💬 Komut Gönder</h2>
            <div class="command-input-group">
                <input type="text" id="commandInput" placeholder="Komut yazın... örn: /mine stone">
                <button class="btn-primary" id="sendCmd">Gönder</button>
            </div>
        </div>

        <div class="command-section">
            <h2>📋 Görevler</h2>
            <div class="command-input-group">
                <input type="text" id="taskInput" placeholder="Yeni görev yazın...">
                <button class="btn-primary" id="addTask">Görev Ekle</button>
            </div>
            <ul class="tasks-list" id="tasksList"></ul>
        </div>

        <div class="card">
            <h2>📜 Loglar</h2>
            <div class="logs" id="logs"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let botRunning = false;

        // UI Elements
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const commandInput = document.getElementById('commandInput');
        const sendCmd = document.getElementById('sendCmd');
        const taskInput = document.getElementById('taskInput');
        const addTask = document.getElementById('addTask');
        const logs = document.getElementById('logs');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');

        // Bot Başlat
        startBtn.addEventListener('click', () => {
            socket.emit('start-bot');
        });

        // Bot Durdur
        stopBtn.addEventListener('click', () => {
            socket.emit('stop-bot');
        });

        // Komut Gönder
        sendCmd.addEventListener('click', () => {
            const cmd = commandInput.value.trim();
            if (cmd) {
                socket.emit('send-command', cmd);
                addLog(`Komut gönderildi: ${cmd}`);
                commandInput.value = '';
            }
        });

        // Enter tuşuyla komut gönder
        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCmd.click();
        });

        // Görev Ekle
        addTask.addEventListener('click', () => {
            const task = taskInput.value.trim();
            if (task) {
                socket.emit('send-command', `/task ${task}`);
                taskInput.value = '';
            }
        });

        // Socket Events
        socket.on('bot-started', (data) => {
            botRunning = true;
            updateStatus();
            addLog('✅ Bot başarıyla başladı!');
        });

        socket.on('bot-stopped', () => {
            botRunning = false;
            updateStatus();
            addLog('⏹ Bot durduruldu');
        });

        socket.on('bot-error', (data) => {
            addLog(`❌ Hata: ${data.message}`, 'error');
        });

        // Status Güncelle
        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                if (data.status === 'online') {
                    statusIndicator.classList.add('online');
                    statusText.textContent = '🟢 Bot Çalışıyor';
                    document.getElementById('username').textContent = data.username || '-';
                    if (data.position) {
                        document.getElementById('position').textContent = 
                            `${Math.floor(data.position.x)}, ${Math.floor(data.position.y)}, ${Math.floor(data.position.z)}`;
                    }
                    document.getElementById('dimension').textContent = data.dimension || '-';
                } else {
                    statusIndicator.classList.remove('online');
                    statusText.textContent = '🔴 Bot Çalışmıyor';
                }

                // Sağlık güncelle
                const healthRes = await fetch('/api/health');
                const healthData = await healthRes.json();
                document.getElementById('health').textContent = 
                    `${Math.round(healthData.health * 10) / 10} / ${healthData.maxHealth}`;
                document.getElementById('healthBar').style.width = 
                    `${(healthData.health / healthData.maxHealth) * 100}%`;
                document.getElementById('hunger').textContent = 
                    `${healthData.food} / ${healthData.maxFood}`;
                document.getElementById('hungerBar').style.width = 
                    `${(healthData.food / healthData.maxFood) * 100}%`;

                // Envanter güncelle
                const invRes = await fetch('/api/inventory');
                const invData = await invRes.json();
                updateInventory(invData.items);
            } catch (error) {
                console.error('Status güncelleme hatası:', error);
            }
        }

        function updateInventory(items) {
            const inv = document.getElementById('inventory');
            inv.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'inventory-item';
                div.title = `${item.name} x${item.count}`;
                div.innerHTML = `<small>${item.name}</small><br><strong>${item.count}</strong>`;
                inv.appendChild(div);
            });
        }

        function addLog(message, type = 'info') {
            const logLine = document.createElement('div');
            logLine.className = `log-line log-${type}`;
            const time = new Date().toLocaleTimeString('tr-TR');
            logLine.textContent = `[${time}] ${message}`;
            logs.appendChild(logLine);
            logs.scrollTop = logs.scrollHeight;

            if (logs.children.length > 100) {
                logs.removeChild(logs.firstChild);
            }
        }

        // Her 2 saniyede bir status güncelle
        setInterval(updateStatus, 2000);
        updateStatus();
    </script>
</body>
</html>
